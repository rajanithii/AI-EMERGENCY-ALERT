<!DOCTYPE html>
<html>
<head>
<title>LifeLine — Profile</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --red:#ff1a1a;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
}

body{
  min-height:100vh;
  background:#080808;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'DM Sans',sans-serif;
  color:white;
  overflow:hidden;
}

.grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,26,26,0.035) 1px, transparent 1px),
    linear-gradient(90deg,rgba(255,26,26,0.035) 1px, transparent 1px);
  background-size:50px 50px;
}
.glow-bg{
  position:fixed;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,26,26,0.08) 0%, transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%);
}

.card{
  position:relative;
  z-index:2;
  width:380px;
  padding:40px 36px;
  border-radius:28px;
  background:var(--glass);
  backdrop-filter:blur(30px);
  border:1px solid var(--border);
  box-shadow:0 0 80px rgba(255,26,26,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
  animation:fadeUp 0.7s cubic-bezier(0.34,1.4,0.64,1);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

/* Avatar */
.avatar{
  width:80px;height:80px;
  border-radius:50%;
  background:linear-gradient(135deg,#ff1a1a,#770000);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  margin:0 auto 20px;
  box-shadow:0 0 30px rgba(255,26,26,0.4);
  border:2px solid rgba(255,26,26,0.3);
}

.card-title{
  font-family:'Orbitron',monospace;
  font-size:16px;
  letter-spacing:3px;
  color:white;
  text-align:center;
  margin-bottom:4px;
}
.card-sub{
  font-size:12px;
  color:rgba(255,255,255,0.3);
  text-align:center;
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:30px;
}

/* Fields */
.field{
  display:flex;
  align-items:flex-start;
  gap:14px;
  padding:16px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  margin-bottom:10px;
  transition:border-color 0.2s;
}
.field:hover{border-color:rgba(255,26,26,0.2);}

.field-icon{
  font-size:18px;
  margin-top:1px;
  flex-shrink:0;
}
.field-label{
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  margin-bottom:3px;
}
.field-value{
  font-size:15px;
  color:white;
  font-weight:500;
}
.field-value.empty{
  color:rgba(255,255,255,0.25);
  font-style:italic;
  font-size:13px;
}

/* Blood group badge */
.blood-badge{
  display:inline-block;
  padding:2px 10px;
  border-radius:20px;
  background:rgba(255,26,26,0.15);
  border:1px solid rgba(255,26,26,0.3);
  color:var(--red);
  font-family:'Orbitron',monospace;
  font-size:13px;
  font-weight:700;
}

/* Divider */
.divider{
  height:1px;
  background:var(--border);
  margin:20px 0;
}

/* Buttons */
.btn-row{
  display:flex;gap:10px;
  margin-top:6px;
}
.btn{
  flex:1;
  padding:13px;
  border:none;
  border-radius:12px;
  font-family:'Orbitron',monospace;
  font-size:11px;
  letter-spacing:2px;
  cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
}
.btn:active{transform:scale(0.97);}

.btn-primary{
  background:linear-gradient(135deg,#ff1a1a,#cc0000);
  color:white;
  box-shadow:0 0 25px rgba(255,26,26,0.3);
}
.btn-primary:hover{box-shadow:0 0 40px rgba(255,26,26,0.5);}

.btn-secondary{
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.6);
  border:1px solid var(--border);
}
.btn-secondary:hover{background:rgba(255,255,255,0.1);color:white;}
</style>
</head>
<body>

<div class="grid"></div>
<div class="glow-bg"></div>

<div class="card">
  <div class="avatar" id="avatarChar">👤</div>
  <div class="card-title" id="displayName">Your Profile</div>
  <div class="card-sub">Emergency Identity Card</div>

  <div class="field">
    <span class="field-icon">👤</span>
    <div class="field-content">
      <div class="field-label">Full Name</div>
      <div class="field-value" id="name">—</div>
    </div>
  </div>

  <div class="field">
    <span class="field-icon">📱</span>
    <div class="field-content">
      <div class="field-label">Phone Number</div>
      <div class="field-value" id="phone">—</div>
    </div>
  </div>

  <div class="field">
    <span class="field-icon">🩸</span>
    <div class="field-content">
      <div class="field-label">Blood Group</div>
      <div class="field-value" id="blood">—</div>
    </div>
  </div>

  <div class="field">
    <span class="field-icon">📍</span>
    <div class="field-content">
      <div class="field-label">Address</div>
      <div class="field-value" id="address">—</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="editProfile()">✏ EDIT</button>
    <button class="btn btn-primary" onclick="goHome()">← BACK</button>
  </div>
</div>

<script>
const profile = JSON.parse(localStorage.getItem('profile') || '{}');

function setField(id, val, isBlood){
  const el = document.getElementById(id);
  if(val && val.trim()){
    if(isBlood){
      el.innerHTML = `<span class="blood-badge">${val}</span>`;
    } else {
      el.textContent = val;
    }
  } else {
    el.textContent = 'Not provided';
    el.classList.add('empty');
  }
}

if(profile.name){
  document.getElementById('displayName').textContent = profile.name;
  document.getElementById('avatarChar').textContent = profile.name.charAt(0).toUpperCase();
}

setField('name', profile.name);
setField('phone', profile.phone);
setField('blood', profile.blood, true);
setField('address', profile.address);

function goHome(){
  window.location.href = 'user.html';
}
function editProfile(){
  window.location.href = 'profile.html';
}
</script>
</body>
</html>
